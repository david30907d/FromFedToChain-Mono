name: Deploy API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - packages/pipeline/**
      - prompts/**
      - Dockerfile
      - fly.toml

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-api-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install workspace dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Build (verification)
        run: pnpm build

      - name: Capture release metadata
        id: release_metadata
        run: |
          echo "commit_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_MOBILE }}
        run: |
          args=(flyctl deploy . --remote-only --config fly.toml)
          args+=(--build-arg "COMMIT_SHA=${{ steps.release_metadata.outputs.commit_sha }}")
          args+=(--build-arg "BUILD_TIME=${{ steps.release_metadata.outputs.build_time }}")
          "${args[@]}"